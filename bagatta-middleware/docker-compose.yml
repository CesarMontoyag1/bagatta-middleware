version: '3.9'

services:
  middleware:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  # Postgres local (solo para desarrollo sin Supabase)
  # En producción se usa Supabase — comentar este servicio y apuntar DATABASE_URL a Supabase
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     bagatta
      POSTGRES_PASSWORD: bagatta_dev
      POSTGRES_DB:       bagatta_middleware
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
